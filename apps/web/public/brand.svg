<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Casual Sheets">
  <title>Casual Sheets</title>
  <!-- Soft green rounded tile -->
  <rect width="64" height="64" rx="14" fill="#217346"/>
  <!-- Tilted document — slight rotation gives the "casual" lean -->
  <g transform="rotate(-6 32 32)">
    <!-- Page body with folded corner -->
    <path d="M16 14 H42 L48 20 V50 H16 Z" fill="#ffffff"/>
    <!-- Folded triangle catching darker page color -->
    <path d="M42 14 L48 20 H42 Z" fill="#d3e6dc"/>
    <!-- Spreadsheet grid: 4 columns × 4 rows -->
    <rect x="20" y="26" width="22" height="20" fill="none" stroke="#217346" stroke-width="0.6" opacity="0.75"/>
    <line x1="25.5" y1="26" x2="25.5" y2="46" stroke="#217346" stroke-width="0.6" opacity="0.75"/>
    <line x1="31" y1="26" x2="31" y2="46" stroke="#217346" stroke-width="0.6" opacity="0.75"/>
    <line x1="36.5" y1="26" x2="36.5" y2="46" stroke="#217346" stroke-width="0.6" opacity="0.75"/>
    <line x1="20" y1="31" x2="42" y2="31" stroke="#217346" stroke-width="0.6" opacity="0.75"/>
    <line x1="20" y1="36" x2="42" y2="36" stroke="#217346" stroke-width="0.6" opacity="0.75"/>
    <line x1="20" y1="41" x2="42" y2="41" stroke="#217346" stroke-width="0.6" opacity="0.75"/>
  </g>
</svg>
