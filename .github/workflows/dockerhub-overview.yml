name: Sync Docker Hub overview

# Pushes docs/DOCKERHUB.md to the casualoffice/sheets Docker Hub "Repository
# overview" WITHOUT rebuilding/publishing an image. The image publish workflow
# (docker-publish.yml) also syncs it on every release, but that only fires on a
# tag — this lets us refresh the overview on its own:
#   • automatically when docs/DOCKERHUB.md changes on main, and
#   • on demand via the Actions "Run workflow" button.
#
# AUTH NOTE: the Docker Hub description API needs a credential with write access
# to the *repository's* metadata, which a plain image-push access token does NOT
# have (it 403s). Set a `DOCKERHUB_DESCRIPTION_TOKEN` secret to a PAT (or account
# password) whose owner can edit the casualoffice/sheets repo; this workflow
# prefers it and falls back to `DOCKERHUB_TOKEN`. Until then the step will fail
# (visibly — this workflow is NOT continue-on-error, unlike the publish step) so
# the auth gap is obvious rather than silent.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docs/DOCKERHUB.md
      - .github/workflows/dockerhub-overview.yml

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push overview to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DESCRIPTION_TOKEN || secrets.DOCKERHUB_TOKEN }}
          repository: casualoffice/sheets
          short-description: 'Excel-flavored web spreadsheet with real-time co-editing. Single image (web + Hocuspocus + Fastify). Apache-2.0.'
          readme-filepath: ./docs/DOCKERHUB.md
