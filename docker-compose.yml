# Casual Sheets — production-style compose.
#
#   docker compose up -d
#   open http://localhost:3000
#
# Default shape: anonymous co-edit rooms persisted via Redis (the
# pre-Phase-C behaviour the e2e suite + live demo expect). To enable
# Phase C personal mode (sign up + per-user file storage at
# /data/users/<userID>/), drop a `.env` next to this file with:
#
#   CASUAL_PERSONAL_MODE=single   # or `multi`
#
# and `docker compose up -d` again. Workbooks persist in the named
# `casual-data` volume; the README's "Recommended: personal mode"
# section has the full walk-through.
#
# Wires the single app image to:
#   - a `casual-data` volume mounted at /data — used when personal
#     mode is on. Holds the users SQLite + per-user .xlsx tree.
#     Survives `docker compose down` and `docker compose pull`.
#   - a Redis container for Y.Doc snapshots so co-edit rooms survive
#     restarts. Without Redis, the app still runs (in-memory only) —
#     see Dockerfile for the bare `docker run` form.

services:
  app:
    image: casualoffice/sheets:0.3.2
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Vite bakes these into the bundle at build time — override here
        # if you want the image to ship with different file-size guards
        # than the defaults.
        VITE_COLLAB_ENABLED: ${VITE_COLLAB_ENABLED:-1}
        VITE_MAX_OPEN_MB: ${VITE_MAX_OPEN_MB:-100}
        VITE_SOFT_WARN_MB: ${VITE_SOFT_WARN_MB:-25}
    container_name: casual-sheets
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      # Per-user workbook storage + users SQLite. Phase C requires this
      # to survive container restarts — without it, every `docker compose
      # down` loses every signup + every saved workbook. Override the
      # host-side with a bind mount if you want to back up to your own
      # path: `- ./workbooks:/data`.
      - casual-data:/data
    environment:
      NODE_ENV: production
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # The collab server (now a product-agnostic submodule vendored across
      # Docs/Sheets) namespaces Redis room keys by prefix. Pin the legacy
      # Sheets prefix so rooms persisted by pre-submodule images — which used
      # a hardcoded `casual-sheets:room:` — stay readable after upgrading.
      # Safe to drop on a fresh deployment with no existing Redis snapshots.
      CASUAL_REDIS_PREFIX: ${CASUAL_REDIS_PREFIX:-casual-sheets:room:}
      # Eviction window for idle rooms (minutes). The previous 15-min
      # window was short enough that a user closing a laptop for coffee
      # came back to a blank sheet. Only "throwaway" rooms (no
      # password, no uploaded content) ever evict; password-protected
      # rooms and rooms with a seed/snapshot stay forever. See
      # `RoomRegistry.isEvictable` in apps/server/src/rooms.ts.
      ROOM_TTL_MIN: ${ROOM_TTL_MIN:-60}
      # Cap on multipart + raw-binary uploads (xlsx seed + gzipped
      # snapshot). Defaults to 100 MB. Raise alongside VITE_MAX_OPEN_MB
      # in the build args below if you need bigger workbooks.
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-100}
      # ─── Phase C personal mode ─────────────────────────────────────
      # `local` persists workbooks under CASUAL_LOCAL_PATH (mounted
      # above). `memory` keeps the pre-Phase-C in-process map (loses
      # data on restart). See docs/STORAGE_MODES.md.
      CASUAL_STORAGE: ${CASUAL_STORAGE:-local}
      CASUAL_LOCAL_PATH: ${CASUAL_LOCAL_PATH:-/data}
      # `none` (default) = anonymous WOPI / no-signup shape — the
      # pre-Phase-C behaviour, what the e2e suite and the live demo
      # at sheet.casualoffice.org expect. Flip to `single` (first signup
      # mints the lone admin, signup closes) or `multi` (signup stays
      # open, per-user file isolation) via a `.env` entry to opt into
      # Phase C personal mode. The README's "Recommended: personal
      # mode" section walks through the `.env` setup.
      CASUAL_PERSONAL_MODE: ${CASUAL_PERSONAL_MODE:-none}
      # Optional escape hatch — admin minted on first boot when the
      # users table is empty. Set in your `.env` (not committed) as
      # `CASUAL_BOOTSTRAP_USER=admin:hunter2`. Silently no-ops once
      # any user exists; never rotates a live password.
      CASUAL_BOOTSTRAP_USER: ${CASUAL_BOOTSTRAP_USER:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    # Pinned minor version for reproducibility; alpine for size.
    image: redis:7.4-alpine
    container_name: casual-sheets-redis
    restart: unless-stopped
    # appendonly = persist writes to disk; keeps Y.Doc snapshots across
    # `docker compose down` without committing to a heavyweight backup
    # story for a v1 self-hosted deploy.
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
  casual-data:
