<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Casual Sheets">
  <title>Casual Sheets</title>
  <!-- Soft green rounded tile -->
  <rect width="64" height="64" rx="14" fill="#217346"/>
  <!-- Tilted document — slight rotation gives the "casual" lean -->
  <g transform="rotate(-6 32 32)">
    <!-- Page body with folded corner -->
    <path d="M16 14 H42 L48 20 V50 H16 Z" fill="#ffffff"/>
    <!-- Folded triangle catching darker page color -->
    <path d="M42 14 L48 20 H42 Z" fill="#d3e6dc"/>
    <!-- Four rows of grid cells, replacing docx-editor's text lines.
         Same x/y/height as the original four <rect> rows so the rhythm
         on the page is identical; each row is split into four cells
         (5 px wide, 1 px gap) to read as a spreadsheet. -->
    <rect x="20"   y="26" width="5" height="2" rx="0.4" fill="#217346" opacity="0.75"/>
    <rect x="25.5" y="26" width="5" height="2" rx="0.4" fill="#217346" opacity="0.75"/>
    <rect x="31"   y="26" width="5" height="2" rx="0.4" fill="#217346" opacity="0.75"/>
    <rect x="36.5" y="26" width="5" height="2" rx="0.4" fill="#217346" opacity="0.75"/>
    <rect x="20"   y="32" width="5" height="2" rx="0.4" fill="#217346" opacity="0.55"/>
    <rect x="25.5" y="32" width="5" height="2" rx="0.4" fill="#217346" opacity="0.55"/>
    <rect x="31"   y="32" width="5" height="2" rx="0.4" fill="#217346" opacity="0.55"/>
    <rect x="36.5" y="32" width="5" height="2" rx="0.4" fill="#217346" opacity="0.55"/>
    <rect x="20"   y="38" width="5" height="2" rx="0.4" fill="#217346" opacity="0.75"/>
    <rect x="25.5" y="38" width="5" height="2" rx="0.4" fill="#217346" opacity="0.75"/>
    <rect x="31"   y="38" width="5" height="2" rx="0.4" fill="#217346" opacity="0.75"/>
    <rect x="36.5" y="38" width="5" height="2" rx="0.4" fill="#217346" opacity="0.75"/>
    <rect x="20"   y="44" width="5" height="2" rx="0.4" fill="#217346" opacity="0.55"/>
    <rect x="25.5" y="44" width="5" height="2" rx="0.4" fill="#217346" opacity="0.55"/>
    <rect x="31"   y="44" width="5" height="2" rx="0.4" fill="#217346" opacity="0.55"/>
    <rect x="36.5" y="44" width="5" height="2" rx="0.4" fill="#217346" opacity="0.55"/>
  </g>
</svg>
