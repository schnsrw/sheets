name: Release (npm)

# Changesets-driven npm release for @schnsrw/casual-sheets.
#
# Push to main:
#   - If .changeset/*.md is non-empty: open / update a release PR with
#     version bumps + CHANGELOG entries.
#   - If empty (i.e. release PR just merged): build + `changeset publish`
#     under the @schnsrw scope using secrets.NODE_PASS as the npm token.
#
# secrets.NODE_PASS — npm automation token for the @schnsrw scope.
# secrets.NODE_USERNAME — informational only (npm token auth doesn't need it).

on:
  push:
    branches: [main]

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version + Publish
    runs-on: ubuntu-latest
    # NODE_PASS / NODE_USERNAME live as environment secrets on
    # `github-pages`. Attaching the job to that environment is what
    # makes `${{ secrets.NODE_PASS }}` resolve to the real token.
    environment: github-pages
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: '10.33.4'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @schnsrw/casual-sheets build

      # Write ~/.npmrc explicitly so `changeset publish` (and the
      # `pnpm dlx` subshell under it) sees the auth token regardless
      # of the temp .npmrc that setup-node creates at
      # $NPM_CONFIG_USERCONFIG (which dlx's isolated cwd ignores).
      - name: Configure npm auth
        run: |
          cat > "$HOME/.npmrc" <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NODE_PASS }}

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NODE_PASS }}
          NPM_TOKEN: ${{ secrets.NODE_PASS }}
