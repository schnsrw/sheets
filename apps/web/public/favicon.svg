<svg width="32" height="40" viewBox="0 0 32 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Casual Sheets">
  <title>Casual Sheets</title>
  <!-- Page body — same path as docx-editor's title-bar icon, only the
       fill changed from blue (#1a73e8) to teal-cyan (#0e7490). -->
  <path d="M2 0C0.9 0 0 0.9 0 2V38C0 39.1 0.9 40 2 40H30C31.1 40 32 39.1 32 38V10L22 0H2Z" fill="#0e7490"/>
  <!-- Folded corner, darker shade of the same cyan. -->
  <path d="M22 0L32 10H24C22.9 10 22 9.1 22 8V0Z" fill="#0a5266"/>
  <!-- The three text-line rects from docx-editor are at y=18, 23, 28,
       x=7, width=18. Replace each with a row of 4 cells so the icon
       signals "spreadsheet" while keeping the same vertical rhythm,
       opacities, and overall mass. -->
  <rect x="7"    y="18" width="4" height="2" rx="0.5" fill="#fff"/>
  <rect x="11.5" y="18" width="4" height="2" rx="0.5" fill="#fff"/>
  <rect x="16"   y="18" width="4" height="2" rx="0.5" fill="#fff"/>
  <rect x="20.5" y="18" width="4" height="2" rx="0.5" fill="#fff"/>
  <rect x="7"    y="23" width="4" height="2" rx="0.5" fill="#fff"/>
  <rect x="11.5" y="23" width="4" height="2" rx="0.5" fill="#fff"/>
  <rect x="16"   y="23" width="4" height="2" rx="0.5" fill="#fff"/>
  <rect x="20.5" y="23" width="4" height="2" rx="0.5" fill="#fff"/>
  <rect x="7"    y="28" width="4" height="2" rx="0.5" fill="#fff"/>
  <rect x="11.5" y="28" width="4" height="2" rx="0.5" fill="#fff"/>
  <rect x="16"   y="28" width="4" height="2" rx="0.5" fill="#fff"/>
  <rect x="20.5" y="28" width="4" height="2" rx="0.5" fill="#fff"/>
</svg>
